# 注册到 Nacos 中的服务名称
spring.application.name=notification-service

# 新服务使用 8081，避免与原服务的 8080 冲突
server.port=8081

# Nacos 注册中心地址
spring.cloud.nacos.discovery.server-addr=${NACOS_HOST:localhost}:8848

# Nacos 配置中心地址
spring.cloud.nacos.config.server-addr=${NACOS_HOST:localhost}:8848
spring.cloud.nacos.config.file-extension=properties

# 从 Nacos 加载配置文件
spring.config.import=optional:nacos:notification-service.properties
